function getDailyIndex() {
  const today = new Date();
  const start = new Date(today.getFullYear(), 0, 0);
  const diff = today - start;
  const day = Math.floor(diff / (1000 * 60 * 60 * 24));
  return day % data.length;
}

function loadDaily() {
  const index = getDailyIndex();
  showContent(index);
}

function showContent(i) {
  document.getElementById("verse").innerText = data[i].verse;
  document.getElementById("reflection").innerText = data[i].reflection;

  const img = images[Math.floor(Math.random()*images.length)];
  document.getElementById("image").src = img;
}

function nextVerse() {
  const random = Math.floor(Math.random() * data.length);
  showContent(random);
}

function shareWhatsApp() {
  const text = document.getElementById("verse").innerText + " " +
               document.getElementById("reflection").innerText;

  const url = "https://wa.me/?text=" + encodeURIComponent(text);
  window.open(url, "_blank");
}

function toggleDark() {

}
